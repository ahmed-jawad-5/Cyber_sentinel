version: "3.9"

services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: udp-backend
    ports:
      - "8000:8000"
      - "8001:8001"
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ../backend/models:/app/backend/models:ro   # XGBoost + LLM models
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: udp-frontend
    ports:
      - "3000:5173"
    depends_on:
      - backend
    restart: unless-stopped
